<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Marazzi Angebots-Tool v6.0</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23cc0000' width='32' height='32' rx='6'/><text x='16' y='22' font-size='18' font-weight='900' fill='white' text-anchor='middle' font-family='Arial'>M</text></svg>">
<style>
:root{--red:#cc0000;--dark:#2c3e5a;--bg:#f4f4f2;--card:#fff;--border:#e0ddd8;--text:#222}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input:focus,select:focus{outline:none;border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(204,0,0,0.08)}
button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

.hdr{background:var(--dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:16px}
.hdr .logo{display:flex;align-items:center}
.hdr .logo img{height:22px}
.hdr .tag{background:var(--red);color:#fff;padding:4px 12px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;font-family:'Segoe UI',system-ui,sans-serif}
.hdr .info{color:#555;font-size:11px}

.wrap{max-width:1200px;margin:0 auto;padding:24px 16px}
.card{background:var(--card);border-radius:14px;padding:28px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.04);border:1px solid var(--border)}
.card h2{margin:0 0 20px;font-size:15px;font-weight:700;color:#333;display:flex;align-items:center;gap:10px}
.snum{background:var(--red);color:#fff;width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}

.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.fl label{display:block;font-size:10px;font-weight:700;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px}
.fl input,.fl select{width:100%;padding:10px 14px;border-radius:8px;border:2px solid var(--border);font-size:13px;background:#fff;transition:border-color .15s}
.fl input[readonly]{background:#f7f7f5;font-family:'Courier New',monospace;font-weight:700;color:#555}

.sr{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.sr select{padding:10px 14px;border-radius:8px;border:2px solid var(--border);font-size:13px;min-width:180px;background:#fff}
.sr input{flex:1;padding:10px 14px;border-radius:8px;border:2px solid var(--border);font-size:13px;min-width:200px}

.res{max-height:300px;overflow:auto;border:2px solid var(--border);border-radius:10px;background:#fff;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.res table{width:100%;border-collapse:collapse;font-size:12px}
.res th{padding:8px 10px;text-align:left;font-weight:700;font-size:10px;color:#888;background:#fafaf8;position:sticky;top:0;z-index:1;text-transform:uppercase;letter-spacing:0.5px}
.res td{padding:6px 10px;border-bottom:1px solid #f0f0ec}
.res tr:hover td{background:#f8f6f0}
.ba{background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-weight:700;font-size:11px;transition:background .15s}
.ba:hover{background:#a00}

.pt{width:100%;border-collapse:collapse;font-size:12px}
.pt th{padding:8px 6px;font-weight:700;font-size:10px;color:#888;background:#fafaf8;text-transform:uppercase;letter-spacing:0.3px}
.pt td{padding:6px;border-bottom:1px solid #f0f0ec;vertical-align:middle}
.pt select{padding:4px 5px;border-radius:6px;border:1.5px solid #ddd;font-size:11px;font-weight:600;background:white;min-width:55px}
.pt input[type=number]{width:65px;padding:5px 6px;border-radius:6px;border:2px solid #ddd;text-align:center;font-size:12px;font-weight:600}
.ni{width:88px;padding:5px 6px;border-radius:6px;border:2px solid #ddd;text-align:right;font-size:12px;font-weight:700;color:var(--red)}
.ni.man{border-color:#f90!important;background:#fff8f0}
.bd{background:none;border:none;color:#ccc;font-size:18px;font-weight:700;transition:color .15s}
.bd:hover{color:var(--red)}
.fracht-btn{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;border:1.5px solid;cursor:pointer;transition:all .15s;min-width:42px;text-align:center}
.fracht-btn.exw{background:#f0f8f0;color:#2a7a2a;border-color:#b0d8b0}
.fracht-btn.dap{background:#fff0e8;color:#c06000;border-color:#f0c8a0}

.acts{display:flex;gap:12px;justify-content:center;padding:10px 0 16px;flex-wrap:wrap;align-items:center}
.bp{background:var(--red);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-size:15px;font-weight:700;letter-spacing:0.5px;box-shadow:0 4px 16px rgba(204,0,0,0.25);transition:all .2s}
.btn-transport{border:2px solid #e0a000;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:0.3px}
.btn-transport.off{background:#fff;color:#e0a000}
.btn-transport.on{background:#e0a000;color:#fff;box-shadow:0 2px 8px rgba(224,160,0,0.3)}
.transport-row{background:#fffbf0;border:2px dashed #e0a000;border-radius:8px;padding:12px 16px;margin-top:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.transport-row input{padding:7px 10px;border-radius:6px;border:2px solid #e0a000;font-size:13px;font-weight:600;text-align:right;width:160px}
.bp:hover{background:#a00;box-shadow:0 6px 20px rgba(204,0,0,0.35);transform:translateY(-1px)}
.bp:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none}
.br{background:#fff;color:#666;border:2px solid #ddd;border-radius:10px;padding:14px 28px;font-size:13px;font-weight:600;transition:border-color .15s}
.br:hover{border-color:#999}
.msg{text-align:center;padding:12px 20px;margin:0 auto 16px;max-width:520px;background:#fff3e0;color:#e65100;border-radius:10px;font-size:13px;font-weight:500}
.ft{text-align:center;padding:16px 0;color:#bbb;font-size:10px;border-top:1px solid #eee;letter-spacing:0.3px}
.ocd{position:absolute;z-index:10;top:100%;left:0;right:0;max-height:200px;overflow:auto;background:#fff;border:2px solid #ddd;border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,0.1)}
.ocd div{padding:8px 14px;font-size:12px;cursor:pointer;border-bottom:1px solid #f5f5f3;transition:background .1s}
.ocd div:hover{background:#f8f6f0}
.oco{position:fixed;inset:0;z-index:5}

.opts-row{margin-top:18px;padding:12px 16px;background:#fafaf8;border-radius:9px;border:1px solid #eee;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.opts-row .opt-item{display:flex;align-items:center;gap:8px}
.opts-row input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--red)}
.opts-row label{font-size:13px;color:#555;cursor:pointer}
.opts-row .sub{color:#aaa;font-size:11px}
.lnr-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.lnr-input{width:52px;padding:6px 8px;border-radius:6px;border:2px solid var(--border);font-size:13px;font-weight:700;text-align:center;font-family:'Courier New',monospace}

.nores{padding:14px;color:#aaa;text-align:center;background:#fafaf8;border-radius:9px;font-size:13px}
@media(max-width:600px){
  .hdr{padding:12px 14px}.hdr .logo{font-size:17px;letter-spacing:5px}
  .wrap{padding:14px 10px}.card{padding:18px 14px}.fg{grid-template-columns:1fr}
  .sr{flex-direction:column}.sr select,.sr input{min-width:0;width:100%}
  .pt{font-size:10px}.pt th,.pt td{padding:4px 3px}
  .opts-row{flex-direction:column;align-items:flex-start;gap:12px}
}
</style>
</head>

function fmt(v){return v.toLocaleString('de-DE',{style:'currency',currency:'EUR'})}
function calcNet(b,g,z1,z2,z3){return b*(1-g)*(1-z1)*(1-z2)*(1-z3)}
function genNr(){
  var n=new Date();
  var ini=S.ini||'XX';
  return ini+String(n.getDate()).padStart(2,'0')+String(n.getMonth()+1).padStart(2,'0')+String(n.getFullYear()).slice(-2)+S.lnr;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function init(){

function handleKat(v){
  S.kat=v;
  S.marke='';
  S.ocPdf='';
  var msel=document.getElementById('f-marke');
  if(!v){
    msel.innerHTML='<option value="">Bitte zuerst Kategorie wählen...</option>';
    msel.disabled=true;
    return;
  }
  msel.disabled=false;
  var entries=D.KM[v]||[];
  msel.innerHTML='<option value="">Bitte wählen...</option>';
  entries.forEach(function(e){
    msel.innerHTML+='<option value="'+esc(e[0])+'">'+esc(e[0])+'</option>';
  });
}

function handleMarke(v){
  S.marke=v;
  // Find the PDF output text
  var entries=D.KM[S.kat]||[];
  S.ocPdf='';
  for(var i=0;i<entries.length;i++){
    if(entries[i][0]===v){S.ocPdf=entries[i][1];break;}
  }
}

function handleErst(n){
  S.erst=n;
  var p=n.trim().split(' ');
  S.ini=p.length>=2?(p[0][0]+p[1][0]).toUpperCase():(p[0]?p[0].substring(0,2).toUpperCase():'');
  updateNr();
}

function handleLnr(el){
  var v=el.value.replace(/\D/g,'').substring(0,2);
  el.value=v;
  S.lnr=v.length===1?'0'+v:(v||'01');
  updateNr();
}

function updateNr(){document.getElementById('f-nr').value=genNr()}

// Search
function doSearch(){
  var q=document.getElementById('s-q').value;
  var sf=document.getElementById('s-serie').dataset.val||'';
  var box=document.getElementById('s-results');
  if(!q&&!sf){box.innerHTML='';return}
  var f=D.A;
  if(sf){var si=D.S.indexOf(sf);f=f.filter(function(a){return a[0]===si})}
  if(q){var ql=q.toLowerCase();f=f.filter(function(a){return a[1].toLowerCase().indexOf(ql)>=0||a[2].toLowerCase().indexOf(ql)>=0||D.S[a[0]].toLowerCase().indexOf(ql)>=0||a[3].toLowerCase().indexOf(ql)>=0})}
  f=f.slice(0,40);
  if(f.length===0){box.innerHTML='<div class="nores">Kein Artikel gefunden</div>';return}
  var h='<div class="res"><table><thead><tr><th>Serie</th><th>Artikel</th><th style="text-align:center">Kode</th><th style="text-align:center">Format</th><th style="text-align:center">Werk</th><th style="text-align:center">ME</th><th style="text-align:right">Brutto</th><th></th></tr></thead><tbody>';
  f.forEach(function(a){
    var idx=D.A.indexOf(a);
    h+='<tr><td style="color:#999;font-size:11px">'+esc(D.S[a[0]])+'</td><td style="font-weight:500">'+esc(a[1])+'</td><td style="text-align:center;font-family:monospace;font-size:11px">'+esc(a[2])+'</td><td style="text-align:center;font-size:11px">'+esc(a[3])+'</td><td style="text-align:center;font-size:10px;color:#999">'+esc(D.W[a[4]])+'</td><td style="text-align:center;font-size:11px">'+esc(D.M[a[5]])+'</td><td style="text-align:right;font-weight:600">'+fmt(a[6])+'</td><td><button class="ba" onclick="addPos('+idx+')">+</button></td></tr>';
  });
  h+='</tbody></table></div>';
  box.innerHTML=h;
}

function werkKz(w){
  if(!w)return '';
  if(w==='BULGARIEN')return 'BG';
  if(w==='POLEN')return 'PL';
  if(w==='SPANIEN')return 'SP';
  return 'IT';
}

function addPos(idx){
  var a=D.A[idx];
  var nr=a[9]||0;
  var b0=a[6]===0||a[6]===0.0;
  var g=nr?0:(b0?0:a[7]);
  var n=(nr||b0)?a[6]:calcNet(a[6],g,0,0,0);
  S.pos.push({serie:D.S[a[0]],art:a[1],artnr:a[2],sz:a[3],werk:D.W[a[4]],me:D.M[a[5]],brutto:a[6],GR:g,brand:D.BR[a[8]],zr1:0,zr2:0,zr3:0,menge:'',net:n,nm:'',fracht:'EXW',noRab:nr,b0:b0?1:0,showAlt:0});
  document.getElementById('s-q').value='';
  document.getElementById('s-results').innerHTML='';
  renderPos();
}

function selOpts(arr,val,lblFn){
  return arr.map(function(r){
    var lb=lblFn?lblFn(r):(r*100).toFixed(0)+'%';
    return '<option value="'+r+'"'+(parseFloat(val)===r?' selected':'')+'>'+esc(lb)+'</option>';
  }).join('');
}

    h+='<td style="text-align:right"><input type="text" class="ni'+(isM?' man':'')+'" value="'+(isM?esc(p.nm):fmt(nv))+'" onfocus="focN(this,'+i+')" onblur="blurN(this,'+i+')" onchange="S.pos['+i+'].nm=this.value.replace(/[^\\d.,]/g,\'\').replace(\',\',\'.\')"></td>';
    h+='<td><button class="bd" onclick="delP('+i+')">\u00d7</button></td>';
    h+='</tr>';
  });
  body.innerHTML=h;
  checkOk();
}

function renderTransport(){
  var c=document.getElementById('transport-row-container');
  if(!S.showTransport){c.innerHTML='';return;}
  c.innerHTML='<div class="transport-row">'+
    '<span style="font-weight:700;font-size:13px;color:#e0a000">\ud83d\ude9b Transportkosten</span>'+
    '<span style="font-size:12px;color:#888">Einmalbetrag (EXW \u2192 Lieferort):</span>'+
    '<input type="text" inputmode="decimal" placeholder="z.B. 850,00 \u20ac" value="'+esc(S.transportKosten)+'" '+
    'oninput="S.transportKosten=this.value" '+
    'style="padding:7px 10px;border-radius:6px;border:2px solid #e0a000;font-size:13px;font-weight:600;text-align:right;width:180px">'+
    '<span style="font-size:11px;color:#aaa">\u2192 erscheint als letzte Position im PDF</span>'+
  '</div>';
}

function chgR(i,f,v){S.pos[i][f]=parseFloat(v);var p=S.pos[i];p.net=calcNet(p.brutto,p.GR,p.zr1,p.zr2,p.zr3);p.nm='';renderPos()}
function delP(i){S.pos.splice(i,1);renderPos()}
function focN(el,i){var p=S.pos[i];var isM=p.nm!==''&&!isNaN(parseFloat(p.nm));if(!isM)el.value=p.net.toFixed(2);el.select();S.pos[i].nm=isM?p.nm:p.net.toFixed(2)}
function blurN(el,i){var p=S.pos[i];if(el.value===''||el.value===fmt(p.net)){S.pos[i].nm='';renderPos();}else{renderPos()}}

function checkOk(){
  var ok=S.pos.length>0 &&
    S.pos[0].menge!==''&&S.pos[0].menge!=='ALT'&&parseInt(S.pos[0].menge)>0 &&
    S.pos.every(function(p){return (p.menge!==''&&(p.menge==='ALT'||parseInt(p.menge)>0))}) &&
    S.pos.every(function(p){if(p.menge==='ALT')return true;var nv=getND(p);return nv>0});
  document.getElementById('btn-pdf').disabled=!ok;
  var zeroP=S.pos.filter(function(p){return p.menge!=='ALT'&&getND(p)<=0});
  var mb=document.getElementById('msg-box');
  if(zeroP.length>0&&S.pos.length>0){mb.textContent='\u26a0 '+zeroP.length+' Position(en) mit Nettopreis 0,00 \u20ac \u2013 bitte manuell Preis eingeben';mb.style.display='block';}
  else{mb.style.display='none';}
}

function doKSearch(q){
  var box=document.getElementById('k-results');
  if(!q||q.length<2){box.style.display='none';return}
  var ql=q.toLowerCase();
  var matches=D.K.filter(function(k){return k.toLowerCase().indexOf(ql)>=0}).slice(0,12);
  if(matches.length===0){box.style.display='none';return}
  var h='';
  matches.forEach(function(m){
    h+='<div onclick="pickK(this.textContent)" style="white-space:normal;line-height:1.3;padding:6px 12px">'+esc(m)+'</div>';
  });
  box.innerHTML=h;box.style.display='block';
}
function pickK(v){S.kunde=v;document.getElementById('f-kunde').value=v;document.getElementById('k-results').style.display='none'}
document.addEventListener('click',function(e){if(!e.target.closest('#f-kunde')&&!e.target.closest('#k-results'))document.getElementById('k-results').style.display='none'});

function doSerieSearch(q){
  var box=document.getElementById('sr-results');
  var inp=document.getElementById('s-serie');
  var ql=(q||'').toLowerCase();
  var matches=D.S;
  var scrollTo=-1;
  if(ql){matches=D.S.filter(function(s){return s.toLowerCase().indexOf(ql)>=0});scrollTo=0;}
  var h='<div onclick="pickSerie(\'\')" style="padding:6px 12px;color:#999;font-style:italic;border-bottom:1px solid #eee">Alle Serien (Filter zurücksetzen)</div>';
  matches.forEach(function(m){
    h+='<div onclick="pickSerie(\''+esc(m).replace(/'/g,"\\'")+'\')" style="padding:6px 12px">'+esc(m)+'</div>';
  });
  box.innerHTML=h;box.style.display='block';if(ql&&box.children.length>1){box.children[1].scrollIntoView({block:'nearest'});}
  if(ql){inp.dataset.val='';doSearch();}
}
function pickSerie(v){
  var inp=document.getElementById('s-serie');
  inp.value=v||'';
  inp.dataset.val=v;
  document.getElementById('sr-results').style.display='none';
  doSearch();
}
document.addEventListener('click',function(e){
  if(!e.target.closest('#s-serie')&&!e.target.closest('#sr-results'))
    document.getElementById('sr-results').style.display='none';
});

init();
